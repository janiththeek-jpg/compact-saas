<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Compact — Cleaning Business Platform</title>
<meta name="description" content="Professional management platform for cleaning and facilities businesses">
<meta name="theme-color" content="#0071e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Compact">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230071e3' rx='45' width='192' height='192'/><text x='96' y='96' font-size='80' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='system-ui' font-weight='600'>C</text></svg>">
<style>
:root{--surface-1:#ffffff;--surface-2:#f5f5f7;--page:#f5f5f7;--sidebar:#f5f5f7;--sidebar-2:#ebebf1;--ink:#1d1d1f;--ink-2:#6f6f77;--muted:#a1a1a6;--line:#d2d2d7;--line-2:#e5e5ea;--brand:#0071e3;--brand-2:#30d158;--radius:18px;--shadow:0 1px 2px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--good:#34c759;--warn:#f5a623;--crit:#ff3b30;}
*{box-sizing:border-box}html,body{margin:0;height:100%;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;background:var(--page);color:var(--ink);font-size:14px;line-height:1.5;letter-spacing:-.012em}
#loginScreen{position:fixed;inset:0;z-index:200;display:grid;grid-template-columns:1.1fr 1fr;background:#fff}#loginScreen.hide{display:none}
.lg-brand{background:linear-gradient(135deg,#0071e3,#30d158);color:#fff;padding:60px;display:flex;flex-direction:column;justify-content:center}
.lg-logo{width:60px;height:60px;border-radius:16px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:30px;margin-bottom:26px}
.lg-brand h2{font-size:36px;font-weight:800;margin-bottom:14px;letter-spacing:-.02em}
.lg-brand p{color:#c4cddc;font-size:15px;line-height:1.5;margin:0}
.lg-form{padding:56px;display:flex;flex-direction:column;justify-content:center}
.lg-form h3{font-size:24px;font-weight:750;margin:0 0 4px}
.lg-form .lsub{color:var(--muted);font-size:14px;margin-bottom:22px}
.lg-field{margin-bottom:14px}.lg-field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--ink-2)}
.lg-field input{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14px}
.lg-field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px #0071e31f}
.lg-btn{width:100%;background:linear-gradient(135deg,#0071e3,#30d158);color:#fff;border:0;padding:13px;border-radius:11px;font-weight:700;font-size:15px;margin-top:6px;box-shadow:0 6px 18px rgba(0,113,227,.3)}
.lg-btn:active{transform:scale(.98)}
@media(max-width:768px){#loginScreen{grid-template-columns:1fr}.lg-brand{display:none}.lg-form{padding:40px 20px}}
#app{display:grid;grid-template-columns:246px 1fr;height:100vh;overflow:hidden}
#app.hide{display:none}
@media(max-width:768px){#app{grid-template-columns:1fr}}
.sidebar{background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto}
.sidebar::-webkit-scrollbar-thumb{background:#d2d2d7}
@media(max-width:768px){.sidebar{position:fixed;left:0;top:0;width:85vw;max-width:320px;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .3s ease-out;background:#fff;border-right:1px solid var(--line);box-shadow:0 10px 40px rgba(0,0,0,.15)}.sidebar.open{transform:translateX(0)}.sidebar-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(2px)}}
.sidebar-overlay{display:none}
.brand{display:flex;align-items:center;gap:11px;padding:20px;font-weight:750;font-size:18px;color:#1d1d1f}
.brand .logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#0071e3,#30d158);display:grid;place-items:center;font-size:17px;color:#fff;font-weight:700}
.nav{padding:6px 12px;flex:1}
.nav a{display:flex;align-items:center;gap:11px;padding:8.5px 12px;border-radius:10px;color:#6f6f77;font-weight:500;font-size:13.5px;margin-bottom:1px;transition:background .12s,color .12s}
@media(max-width:768px){.nav a{padding:12px 14px;font-size:14px;border-radius:11px;min-height:48px}}
.nav a:hover{background:var(--sidebar-2);color:#1d1d1f}
.nav a.active{background:linear-gradient(135deg,#0071e3,#30d158);color:#fff;box-shadow:0 6px 16px rgba(0,113,227,.28)}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:62px;background:var(--surface-1);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;padding:0 24px;flex-shrink:0;z-index:5}
@media(max-width:768px){.topbar{height:56px;padding:0 12px;gap:10px}.topbar h1{font-size:16px}}
.topbar h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.02em}
#menuToggle{display:none;width:44px;height:44px;border:0;background:none;font-size:22px;color:var(--brand);border-radius:10px}
@media(max-width:768px){#menuToggle{display:grid;place-items:center}}
.seg{display:flex;background:var(--surface-2);border-radius:10px;padding:3px}
.seg button{border:0;background:none;padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink-2);transition:.12s}
.seg button.on{background:#fff;color:var(--brand);box-shadow:0 1px 3px rgba(13,21,38,.12)}
.search{margin-left:auto;position:relative}
.search input{width:210px;padding:9px 12px 9px 33px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);font-size:13px}
.search input:focus{outline:none;border-color:var(--brand);background:#fff}
@media(max-width:768px){.search{display:none}}
.tb-btn{width:37px;height:37px;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;font-size:15px}
.tb-btn:hover{background:var(--surface-2)}
.avatar{width:37px;height:37px;border-radius:50%;background:linear-gradient(135deg,#4a3aa7,#2a78d6);color:#fff;display:grid;place-items:center;font-weight:650;font-size:13px;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:24px}
@media(max-width:768px){.content{padding:12px 16px 24px}}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:19px}
@media(max-width:768px){.card{border-radius:16px;padding:16px}}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:8.5px 15px;border-radius:10px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;min-height:44px}
@media(max-width:768px){.btn{min-height:48px;padding:12px 18px;font-size:15px;border-radius:12px;width:100%;margin:4px 0}}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(42,120,214,.28)}
.btn.primary:hover{background:#0052b3}
.badge{display:inline-flex;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--ink-2)}
.badge.good{background:#0ca30c15;color:#0a7d0a}
.badge.warn{background:#f5a62320;color:#96650a}
.badge.crit{background:#e0413f15;color:#bd2b29}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;padding:11px 15px;border-bottom:1px solid var(--line)}
td{padding:13px 15px;border-bottom:1px solid var(--line-2)}
@media(max-width:768px){table{border-spacing:0 8px;border-collapse:separate}th{display:none}tr{display:flex;flex-direction:column;gap:4px;background:#fff;margin-bottom:10px;border:1px solid #f0f0f0;border-radius:12px;padding:8px;overflow:hidden}td{display:block;padding:12px;border:none}}
tr:hover{background:var(--surface-2)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1024px){.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.kpis{grid-template-columns:1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow)}
.kpi .lab{color:var(--ink-2);font-size:12.5px;font-weight:500}
.kpi .val{font-size:27px;font-weight:750;margin:10px 0 4px}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
@media(max-width:1024px){.two-col{grid-template-columns:1fr}}
.usermenu{position:absolute;top:56px;right:20px;background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-lg);width:236px;z-index:80}
.usermenu.hide{display:none}
.um-head{padding:14px 16px;border-bottom:1px solid var(--line)}
.um-head b{font-size:14px}
.um-item{padding:11px 16px;font-size:13.5px;cursor:pointer}
.um-item:hover{background:var(--surface-2)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="lg-brand">
    <div class="lg-logo">✦</div>
    <h2>Compact</h2>
    <p>Professional management platform for cleaning & facilities businesses</p>
  </div>
  <div class="lg-form">
    <h3>Sign In</h3>
    <div class="lsub">Demo mode — any password works</div>
    <div class="lg-field"><label>Email</label><input id="lgEmail" value="janith@compact.app" type="email"></div>
    <div class="lg-field"><label>Password</label><input id="lgPass" type="password" value="demo"></div>
    <button class="lg-btn" onclick="doLogin()">Sign In →</button>
    <p style="font-size:11.5px;color:var(--muted);margin-top:20px">Demo credentials: any email, password=demo</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hide">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" onclick="toggleMenu()"></div>
  <div class="main">
    <header class="topbar">
      <button id="menuToggle" onclick="toggleMenu()">☰</button>
      <h1 id="pageTitle">Dashboard</h1>
      <div style="flex:1"></div>
      <button id="installBtn" class="btn primary" style="display:none;margin-right:10px" onclick="installApp()">📱 Install</button>
      <button class="tb-btn" title="Help" onclick="go('help')">❔</button>
      <div class="avatar" id="userAv" onclick="toggleUserMenu()" title="Account">JH</div>
      <div class="usermenu hide" id="userMenu"></div>
    </header>
    <div class="content" id="view"></div>
  </div>
</div>

<script>
'use strict';

// ===== PWA: Service Worker Registration =====
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').then(reg => {
    console.log('✓ Service Worker registered');
  }).catch(err => {
    console.log('Service Worker error:', err);
  });

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtn');
    if(btn) btn.style.display = 'flex';
  });

  window.installApp = async () => {
    if(deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      const btn = document.getElementById('installBtn');
      if(btn) btn.style.display = 'none';
    }
  };
}

// ===== STATE & DATA =====
const state = { role: 'admin', view: 'dashboard' };
let currentUser = null;

const COLORS = ['#2a78d6','#1baf7a','#eda100','#008300','#4a3aa7','#e34948','#e87ba4','#eb6834'];
const avColor = n => COLORS[n.charCodeAt(0) % COLORS.length];
const initials = n => n.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
const money = n => '$' + Number(n).toLocaleString();

const staff = [
  { name: 'Maria Silva', role: 'Site Supervisor', site: 'Westfield Tower', status: 'in', hrs: 76, rate: 38 },
  { name: 'James Okoro', role: 'Cleaner', site: 'Central Hospital', status: 'in', hrs: 72, rate: 32 },
  { name: 'Grace Mensah', role: 'Site Supervisor', site: 'Riverside Mall', status: 'in', hrs: 76, rate: 38 },
];

const sites = [
  { name: 'Westfield Tower', client: 'Westfield Group', crew: 6, contract: 14200, score: 96 },
  { name: 'Central Hospital', client: 'NT Health', crew: 9, contract: 28500, score: 91 },
  { name: 'Riverside Mall', client: 'Riverside Prop.', crew: 7, contract: 18900, score: 88 },
];

const invoices = [
  { id: 'INV-2041', client: 'Westfield Group', amount: 14200, status: 'Paid', badge: 'good' },
  { id: 'INV-2042', client: 'NT Health', amount: 28500, status: 'Sent', badge: 'warn' },
  { id: 'INV-2043', client: 'Riverside Prop.', amount: 18900, status: 'Overdue', badge: 'crit' },
];

const NAV = [
  { icon: '📊', name: 'Dashboard', view: 'dashboard' },
  { icon: '⏱️', name: 'Time & Attendance', view: 'time' },
  { icon: '🏢', name: 'Sites', view: 'sites' },
  { icon: '💳', name: 'Invoicing', view: 'invoicing' },
  { icon: '📈', name: 'Finance', view: 'finance' },
  { icon: '💰', name: 'Payroll', view: 'payroll' },
  { icon: '👥', name: 'Team', view: 'team' },
  { icon: '⚙️', name: 'Settings', view: 'settings' },
  { icon: '❓', name: 'Help', view: 'help' },
];

// ===== UI FUNCTIONS =====
function doLogin() {
  const email = document.getElementById('lgEmail').value;
  if(!email) {
    alert('Please enter email');
    return;
  }
  currentUser = { email, name: initials(email) };
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  renderNav();
  renderView();
}

function toggleMenu() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}

function go(view) {
  state.view = view;
  toggleMenu();
  renderView();
  return false;
}

function renderNav() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = `
    <div class="brand"><div class="logo">✦</div><span>Compact</span></div>
    <nav class="nav">
      ${NAV.map(item => `<a href="#" onclick="return go('${item.view}')" class="nav-link"><span>${item.icon}</span>${item.name}</a>`).join('')}
    </nav>
  `;
}

function renderView() {
  const v = document.getElementById('view');
  const title = document.getElementById('pageTitle');

  if(state.view === 'dashboard') {
    title.textContent = 'Dashboard';
    v.innerHTML = `
      <div class="kpis">
        <div class="kpi"><div class="lab">Revenue</div><p class="val">${money(310000)}</p></div>
        <div class="kpi"><div class="lab">Active Sites</div><p class="val">${sites.length}</p></div>
        <div class="kpi"><div class="lab">Staff</div><p class="val">${staff.length}</p></div>
        <div class="kpi"><div class="lab">Pending</div><p class="val">${invoices.filter(i=>i.status==='Sent').length}</p></div>
      </div>
      <div class="two-col">
        <div class="card"><h2>Recent Invoices</h2><table>
          <thead><tr><th>ID</th><th>Client</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody>${invoices.map(i=>`<tr><td>${i.id}</td><td>${i.client}</td><td>${money(i.amount)}</td><td><span class="badge ${i.badge}">${i.status}</span></td></tr>`).join('')}</tbody>
        </table></div>
        <div class="card"><h2>Staff</h2><table>
          <thead><tr><th>Name</th><th>Role</th><th>Site</th></tr></thead>
          <tbody>${staff.map(s=>`<tr><td>${s.name}</td><td>${s.role}</td><td>${s.site}</td></tr>`).join('')}</tbody>
        </table></div>
      </div>
    `;
  } else if(state.view === 'sites') {
    title.textContent = 'Sites';
    v.innerHTML = `<div class="card"><h2>All Sites</h2><table>
      <thead><tr><th>Name</th><th>Client</th><th>Crew</th><th>Contract</th><th>Score</th></tr></thead>
      <tbody>${sites.map(s=>`<tr><td>${s.name}</td><td>${s.client}</td><td>${s.crew}</td><td>${money(s.contract)}</td><td><span class="badge good">${s.score}%</span></td></tr>`).join('')}</tbody>
    </table></div>`;
  } else if(state.view === 'invoicing') {
    title.textContent = 'Invoicing';
    v.innerHTML = `<div class="card"><h2>Invoices</h2><table>
      <thead><tr><th>ID</th><th>Client</th><th>Amount</th><th>Status</th></tr></thead>
      <tbody>${invoices.map(i=>`<tr><td>${i.id}</td><td>${i.client}</td><td>${money(i.amount)}</td><td><span class="badge ${i.badge}">${i.status}</span></td></tr>`).join('')}</tbody>
    </table></div>`;
  } else if(state.view === 'help') {
    title.textContent = 'Help';
    v.innerHTML = `<div class="card"><h2>Getting Started</h2><p>Welcome to Compact! Here are some tips:</p>
      <ul><li>Use Dashboard to monitor operations</li><li>Sites shows all customer locations</li><li>Invoicing tracks payments</li><li>Payroll handles wages</li></ul>
      <p>Need help? Email support@compact.app</p></div>`;
  } else {
    title.textContent = state.view.charAt(0).toUpperCase() + state.view.slice(1);
    v.innerHTML = `<div class="card"><h2>${title.textContent}</h2><p>Coming soon...</p></div>`;
  }
}

function toggleUserMenu() {
  const menu = document.getElementById('userMenu');
  menu.classList.toggle('hide');
  if(!menu.classList.contains('hide')) {
    menu.innerHTML = `<div class="um-head"><b>${currentUser?.email}</b></div>
      <div class="um-item" onclick="alert('Profile')">👤 Profile</div>
      <div class="um-item" onclick="logout()">🚪 Logout</div>`;
  }
}

function logout() {
  currentUser = null;
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('app').classList.add('hide');
  document.getElementById('lgEmail').value = 'janith@compact.app';
  document.getElementById('lgPass').value = 'demo';
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('lgEmail').value = 'janith@compact.app';
  document.getElementById('lgPass').value = 'demo';
  document.getElementById('userAv').textContent = 'JH';
});
</script>

</body>
</html>
