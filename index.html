<script>
// ===== PWA: Register Service Worker =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').then(reg=>{
    console.log('✓ Service Worker registered',reg);
  }).catch(err=>console.log('✗ Service Worker error:',err));

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    const installBtn=document.getElementById('installBtn');
    if(installBtn)installBtn.style.display='flex';
  });

  window.installApp=async()=>{
    if(deferredPrompt){
      deferredPrompt.prompt();
      const{outcome}=await deferredPrompt.userChoice;
      console.log(`✓ User response: ${outcome}`);
      deferredPrompt=null;
      const installBtn=document.getElementById('installBtn');
      if(installBtn)installBtn.style.display='none';
    }
  };
}

function renderNav(){
  const nav=document.getElementById('navMenu');
  const items=state.role==='cleaner'?CNAV:NAV;
  nav.innerHTML=items.map(item=>`<a href="#" onclick="return go('${item.view}')" class="nav-link"><span class="ic">${item.icon}</span>${item.name}</a>`).join('');
}

function toggleMenu(){document.getElementById('app').classList.toggle('menu-open');}
function closeMenu(){document.getElementById('app').classList.remove('menu-open');}

function go(view){
  state.view=view;
  closeMenu();
  renderView();
  return false;
}

function setRole(r){
  state.role=r;
  document.getElementById('segAdmin').classList.toggle('on',r==='admin');
  document.getElementById('segCleaner').classList.toggle('on',r==='cleaner');
  renderNav();
  renderView();
}
